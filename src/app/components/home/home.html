<section>
  <form>
    <input type="text" placeholder="Filter by city" />
    <button class="primary" type="button">Search</button>
  </form>
  <section>
    <label>
      Edit Mode :
      <input class="checkbox" type="checkbox" (click)="handleCheck($event)" />
    </label>
    <p>{{ modeString() }}</p>
    <button class="delete-btn" [disabled]="selectedIds().length === 0" (click)="onDelete()">
      Delete Selected Items ({{ selectedIds().length }})
    </button>
    <button
      class="restore-btn"
      (click)="onRestore()"
      [disabled]="locationService.getDeletedCount() === 0"
    >
      Restore Deleted Items ({{ locationService.getDeletedCount() }})
    </button>
  </section>
  <section class="results">
    @for (card of cards(); track card.id) {
      <app-housing-location
        [location]="card"
        (locationClick)="handleClick($event)"
        [selectedLocation]="card.selected"
      />
    } @empty {
      <h1>No Homes Available</h1>
    }
  </section>
</section>
