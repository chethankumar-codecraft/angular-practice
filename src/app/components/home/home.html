<section>
  <form>
    <input type="text" placeholder="Filter by city" />
    <button class="primary" type="button">Search</button>
  </form>
  <section class="results">
    @for (location of locationService.getAllLocations(); track $index) {
      <app-housing-location [location]="location" (onLocationClick)="moveToTop($event)" />
    } @empty {
      <h1>Empty data</h1>
    }
  </section>
</section>
