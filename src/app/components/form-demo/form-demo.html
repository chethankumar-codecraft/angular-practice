<label for="name">Name: </label>
<input id="name" type="text" [formControl]="name" (change)="handleChange($event)" />

<p>Entered Value: {{ name.value }}</p>

<button (click)="updateName()">UpdatedName:</button>

<hr />
<form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
  <label for="first-name">First Name: </label>
  @let firstName = profileForm.controls.firstName;
  <input id="first-name" type="text" formControlName="firstName" />
  @if (firstName.touched && !firstName.valid) {
    <p class="error">You must enter a proper name which atleast 6 chars in length</p>
  }
  <label for="last-name">Last Name: </label>
  <input id="last-name" type="text" formControlName="lastName" />
  <label for="email">Email : </label>
  <input id="email" type="text" formControlName="email" />

  <div formGroupName="address">
    <h2>Address</h2>
    <label for="street">Street: </label>
    <input id="street" type="text" formControlName="street" />
    <label for="city">City: </label>
    <input id="city" type="text" formControlName="city" />
    <label for="state">State: </label>
    <input id="state" type="text" formControlName="state" />
    <label for="zip">Zip Code: </label>
    <input id="zip" type="text" formControlName="zip" />
  </div>
  <button type="submit" [disabled]="!profileForm.valid">Submit</button>
  <button (click)="updateForm()">Update Partially</button>
</form>
